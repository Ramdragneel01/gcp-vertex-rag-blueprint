name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest --cov=gcp_vertex_rag_blueprint --cov-report=term-missing

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5
      - name: Init + validate module
        run: |
          cd terraform/environments/dev
          terraform init -backend=false
          terraform validate

  docker:
    needs: [test, terraform-validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t gcp-vertex-rag-blueprint:ci .
      - name: Smoke test container
        run: |
          docker run -d --name gvrb -p 8093:8093 gcp-vertex-rag-blueprint:ci
          for i in {1..30}; do
            if curl -fsS http://localhost:8093/health; then break; fi
            sleep 1
          done
          curl -fsS http://localhost:8093/ready
          curl -fsS http://localhost:8093/v1/config
          docker rm -f gvrb

  publish:
    needs: docker
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/gcp-vertex-rag-blueprint
          TAG=${GITHUB_REF_NAME}
          docker build -t $IMAGE:$TAG -t $IMAGE:latest .
          docker push $IMAGE:$TAG
          docker push $IMAGE:latest
